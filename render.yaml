services:
  - type: web
    name: spaihub-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CAMPAY_USERNAME
        sync: false
      - key: CAMPAY_PASSWORD
        sync: false
      - key: CAMPAY_BASE_URL
        value: https://www.campay.net
      - key: CAMPAY_PERMANENT_ACCESS_TOKEN
        sync: false
      - key: AUTO_DISBURSE_WITHDRAWALS
        value: "true"
      - key: CAMPAY_APP_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: PLATFORM_FEE_PERCENT
        value: "2"
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        value: spaihub
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
